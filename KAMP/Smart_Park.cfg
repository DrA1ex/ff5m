[gcode_macro SMART_PARK]
description: Parks the printhead near the print area within MOVE_SAFE limits.
variable_fallback_x: 110.0
variable_fallback_y: 100.0
variable_fallback_z: 10.0
gcode:
    {% set kamp_settings = printer["gcode_macro _KAMP_Settings"] %}
    {% set smart_park = printer["gcode_macro SMART_PARK"] %}
    {% set limits = printer["gcode_macro MOVE_SAFE"] %}
    {% set verbose_enable = kamp_settings.verbose_enable | abs %}
    {% set margin = [kamp_settings.purge_margin | float, 0.0] | max %}

    # MOVE_SAFE is the single source of truth for the usable motion envelope.
    {% set x_min = limits.x_min | float %}
    {% set x_max = limits.x_max | float %}
    {% set y_min = limits.y_min | float %}
    {% set y_max = limits.y_max | float %}
    {% set z_min = limits.z_min | float %}
    {% set z_max = [
        printer.toolhead.axis_maximum.z | float
        - limits.z_max_margin | float,
        z_min
    ] | max %}
    # The stock start/cleaning flow parks at the far-right rear area. Keep a
    # small Y margin from its 107..111 cleaning zone while retaining the same
    # safe corner, and clamp the fallback if MOVE_SAFE limits ever change.
    {% set fallback_x = [
        [smart_park.fallback_x | float, x_max] | min, x_min
    ] | max %}
    {% set fallback_y = [
        [smart_park.fallback_y | float, y_max] | min, y_min
    ] | max %}
    {% set fallback_z = [
        [smart_park.fallback_z | float, z_max] | min, z_min
    ] | max %}

    {% if "xyz" not in printer.toolhead.homed_axes %}
        { action_raise_error("SMART_PARK requires homed XYZ axes") }
    {% else %}
        {% set all_points = printer.exclude_object.objects
            | map(attribute="polygon") | sum(start=[]) %}
        {% set has_points = all_points | length > 0 %}

        {% if has_points %}
            {% set object_x = (all_points | map(attribute=0) | min) | float %}
            {% set object_y = (all_points | map(attribute=1) | min) | float %}
            {% set object_valid =
                object_x >= x_min and object_x <= x_max
                and object_y >= y_min and object_y <= y_max %}
        {% else %}
            {% set object_x = fallback_x %}
            {% set object_y = fallback_y %}
            {% set object_valid = False %}
        {% endif %}

        # Out-of-range slicer metadata is not trusted. Falling back to the
        # known parking corner is safer than silently using a clamped
        # point derived from untrusted slicer coordinates.
        {% if object_valid %}
            {% set requested_x = object_x - margin %}
            {% set requested_y = object_y - margin %}
        {% else %}
            {% set requested_x = fallback_x %}
            {% set requested_y = fallback_y %}
        {% endif %}
        {% set park_x = [[requested_x, x_max] | min, x_min] | max %}
        {% set park_y = [[requested_y, y_max] | min, y_min] | max %}

        {% set requested_z = kamp_settings.smart_park_height | float %}
        {% set z_valid = requested_z >= z_min and requested_z <= z_max %}
        {% set park_z = requested_z if z_valid else fallback_z %}
        {% set travel_speed = printer.toolhead.max_velocity | float * 60.0 %}

        {% if verbose_enable == True %}
            {% if not object_valid %}
                { action_respond_info(
                    "Smart Park received no valid object coordinates; "
                    "using safe fallback {},{}.".format(park_x, park_y)) }
            {% endif %}
            {% if not z_valid %}
                { action_respond_info(
                    "Smart Park height is outside MOVE_SAFE limits; "
                    "using safe fallback {}.".format(park_z)) }
            {% endif %}
            { action_respond_info(
                "Smart Park location: {},{},{}.".format(
                    park_x, park_y, park_z)) }
        {% endif %}

        SAVE_GCODE_STATE NAME=Presmartpark_State

        {% if printer.toolhead.position.z < park_z %}
            MOVE_SAFE Z={park_z} F={travel_speed} ABSOLUTE=1
        {% endif %}
        MOVE_SAFE X={park_x} Y={park_y} F={travel_speed} ABSOLUTE=1
        MOVE_SAFE Z={park_z} F={travel_speed} ABSOLUTE=1
        M400

        RESTORE_GCODE_STATE NAME=Presmartpark_State
    {% endif %}
