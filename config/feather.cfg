[include ../macros/base.cfg]
[include ../macros/headless.cfg]
[include ../macros/client.cfg]

[feather_screen]
# Optional overrides are intentionally commented out. Defaults live in the
# plugin, which keeps config upgrades compatible with an already-running
# Klipper process that may still have the previous plugin module cached.
# dim_timeout: 60
# z_offset_limit: 2.0
# z_adjust_session_limit: 0.5
# z_adjust_warning_threshold: 0.3
# preheat_pla_nozzle: 220
# preheat_pla_bed: 60
# preheat_petg_nozzle: 250
# preheat_petg_bed: 70
# preheat_abs_nozzle: 260
# preheat_abs_bed: 100
# preheat_abs_pc_nozzle: 270
# preheat_abs_pc_bed: 105

[gcode_macro _PRINT_STATUS]
gcode:
    RESPOND PREFIX="//" MSG="State: {params.S}"
    # Feather ignores this outside status-bearing pages, so forwarding every
    # stage also makes cleaning/leveling/recovery progress visible locally.
    FEATHER_PRINT_STATUS S="{params.S}"
